shop:
  bottleneck_machine: 2          # M2 as bottleneck 

mode:
  run: "generator"               # generator = continous order arrivals

arrival:
  rho_levels: [0.95]       # average utilization rate at bn

processing_times:
  dist: "gamma"                  # generates random processing time
  mean: [51, 59, 54]                # M1, M2, M3 (min)
  cv:   [0.5, 0.5, 0.5]          # Coefficients of variation (h/mean)

scenario:
  due: "weit"        # "eng" (tight) or "weit" (loose)
  dist: "high"          # "off" - "low" - "high"

disturbances:
  enabled: true        # global switch dist
  breakdowns:
    low:  { mttf: 240, mttr: 10 }
    high: { mttf: 120, mttr: 20 }

duedate:
  tightness: { eng: 1.25, weit: 1.80 }
  jitter_frac: 0.1

wlc:
  enabled: true
  mode: "workload"      
  norm: { K: 3 }   # 3/5 WLC Cap
  pool_rule: "FIFO"     # neutral – Heuristics determine the machine's behavior
  topup_period: 0.5
 
policies:
  heuristics: [SPT, EDD, ATC, ML]
  atc: { k: 2, tau: queue_mean_pt }   

sim:
  horizon_hours: 30
  warmup_hours: 5

logging:
  job_log: true
  event_log: true
  queue_snapshots: true
  policy_scores: true
  out_dir: "out"
  verbose: true       
  max_print: 5        
